<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animon Fakemon</title>
<link rel="icon" type="image/png" href="images/ZLOGO.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d1a;--surface:#13131f;--card:#1a1a2e;--hover:#20203a;
  --border:#2a2a45;--text:#e8e8f0;--muted:#6b6b8f;--accent:#7c5cbf;--accent2:#a67de8
}
.t-Neutral{background:#616161}.t-Fire{background:#c94020}.t-Combat{background:#9b1c1c}
.t-Water{background:#1255a0}.t-Flying{background:#4a2a9b}.t-Botanical{background:#256325}
.t-Venom{background:#5a1485}.t-Electric{background:#d4971b;color:#111}
.t-Chthonic{background:#5d3c31}.t-Mentis{background:#c0206a}.t-Mineral{background:#455a64}
.t-Frost{background:#005460}.t-Arthropod{background:#7a9e1a;color:#111}.t-Dragon{background:#151b6e}
.t-Spectral{background:#3d1178}.t-Shadow{background:#1a1a1a;border:1px solid #555}
.t-Metal{background:#6a8090;color:#111}.t-Mythic{background:#941040}
.t-Cosmic{background:#100225;border:1px solid #7c5cbf}.t-Sound{background:#00707a}
.t-Tribal{background:#a02c08}.t-Fungal{background:#487025}.t-Machine{background:#2e3d45}
.t-Microbial{background:#164d15}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;
  height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:8px;margin-right:28px;text-decoration:none}
.logo img{height:32px;width:auto}
.logo-text{font-size:17px;font-weight:800;
  background:linear-gradient(135deg,#a67de8,#7c5cbf);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.srch{background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:7px;font-size:13px;width:190px;outline:none}
.srch::placeholder{color:var(--muted)}
.lang{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.lbtn{padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;
  border:none;background:var(--card);color:var(--muted);transition:all .2s}
.lbtn.active{background:var(--accent);color:#fff}
.rnav{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 28px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.rnav::-webkit-scrollbar{display:none}
.rbtn{padding:10px 15px;font-size:13px;color:var(--muted);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;
  transition:all .2s;display:flex;align-items:center;gap:6px}
.rbtn.active,.rbtn:hover{color:var(--text);border-bottom-color:var(--accent2)}
.rflag{width:20px;height:15px;border-radius:2px;display:inline-block;vertical-align:middle}
.rflag-custom{font-size:15px;line-height:1;vertical-align:middle}
.fbar{padding:10px 28px;display:flex;gap:6px;flex-wrap:wrap;
  align-items:center;border-bottom:1px solid var(--border)}
.flbl{font-size:12px;color:var(--muted);margin-right:2px}
.tbtn{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .2s}
.tbtn.active{border-color:var(--accent);color:var(--accent2)}
.dhead{padding:18px 28px 6px;display:flex;align-items:baseline;gap:10px}
.dtitle{font-size:19px;font-weight:700}
.dcnt{font-size:13px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:12px;padding:14px 28px 28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:14px 12px 12px;cursor:pointer;transition:all .2s;contain:layout style}
.card:hover{background:var(--hover);border-color:var(--accent);transform:translateY(-2px)}
.cnum{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px}
.cimg{width:100%;aspect-ratio:1;border-radius:8px;
  background:linear-gradient(135deg,rgba(124,92,191,.1),rgba(166,125,232,.05));
  display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:7px;overflow:hidden}
.cimg img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.cname{font-size:13px;font-weight:700;margin-bottom:7px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.types{display:flex;gap:3px;flex-wrap:nowrap;overflow:hidden}
.tb{padding:2px 6px;border-radius:20px;font-size:9px;font-weight:600;
  color:#fff;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;
  flex-shrink:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.loading{display:flex;align-items:center;justify-content:center;
  height:200px;font-size:15px;color:var(--muted)}
/* PAGINAÇÃO */
.pagination{display:flex;justify-content:center;align-items:center;
  gap:8px;padding:16px 28px 32px}
.pgbtn{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--card);
  color:var(--text);transition:all .2s}
.pgbtn:hover{border-color:var(--accent);color:var(--accent2)}
.pgbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pgbtn:disabled{opacity:.35;cursor:not-allowed}
.pginfo{font-size:13px;color:var(--muted)}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;
  display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px)}
.ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  width:100%;max-width:780px;max-height:90vh;overflow-y:auto;position:relative}
.mcls{position:absolute;top:14px;right:14px;background:var(--card);border:1px solid var(--border);
  color:var(--text);width:30px;height:30px;border-radius:50%;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.mhero{display:grid;grid-template-columns:240px 1fr}
.mleft{padding:26px 18px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:9px;
  background:linear-gradient(135deg,rgba(124,92,191,.07),transparent)}
.mnums{font-size:11px;color:var(--muted);font-weight:600;text-align:center;line-height:2}
.mimg{width:180px;height:180px;border-radius:14px;background:rgba(255,255,255,.03);
  display:flex;align-items:center;justify-content:center;font-size:80px;overflow:hidden}
.mimg img{width:100%;height:100%;object-fit:cover;border-radius:14px}
.mname{font-size:21px;font-weight:800;text-align:center}
.mtypes{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.mtypes .tb{font-size:12px;padding:4px 13px}
.mspec{font-size:12px;color:var(--muted);background:var(--card);
  padding:3px 12px;border-radius:20px;border:1px solid var(--border);text-align:center}
.mda-link{font-size:11px;color:var(--accent2);text-decoration:none;
  background:rgba(124,92,191,.15);padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);display:inline-block;margin-top:4px}
.mda-link:hover{background:rgba(124,92,191,.3)}
.mright{padding:22px 24px}
.sec{margin-bottom:20px}
.stitle{font-size:11px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--muted);margin-bottom:9px;font-weight:700}
.lore{font-size:13px;line-height:1.75;color:rgba(232,232,240,.85)}
.nd{font-size:13px;color:var(--muted);font-style:italic}
.irow{background:var(--card);border-radius:7px;padding:9px 13px;
  display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ikey{font-size:11px;color:var(--muted)}
.ival{font-size:13px;font-weight:600}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.iitem{background:var(--card);border-radius:7px;padding:9px 13px}
.atag{font-size:10px;padding:2px 7px;border-radius:20px;
  background:rgba(124,92,191,.2);color:var(--accent2);font-weight:600}
.hatag{background:rgba(245,166,35,.15);color:#f9a825}
.insp{background:var(--card);border-radius:7px;padding:9px 13px;font-size:13px;color:rgba(232,232,240,.8)}
.insp b{color:var(--accent2)}
@media(max-width:660px){
  .mhero{grid-template-columns:1fr}
  .mleft{border-right:none;border-bottom:1px solid var(--border)}
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));padding:10px 16px 20px}
  nav{padding:0 14px}.rnav,.fbar,.dhead,.grid{padding-left:14px;padding-right:14px}
}
</style>
</head>
<body>
<nav>
  <div class="logo">
    <img src="images/ZLOGO.png" alt="Metanikk Regions logo">
    <span class="logo-text">Metanikk Regions</span>
  </div>
  <div class="nav-r">
    <input class="srch" placeholder="Buscar animon..." oninput="doSearch(this.value)">
    <div class="lang">
      <button class="lbtn active" onclick="setLang('pt',this)">PT</button>
      <button class="lbtn" onclick="setLang('en',this)">EN</button>
    </div>
  </div>
</nav>
<div class="rnav" id="rnav"></div>
<div class="fbar" id="fbar"></div>
<div class="dhead"><div class="dtitle" id="dtitle">Metanikk Regions</div><div class="dcnt" id="dcnt"></div></div>
<div class="grid" id="grid"><div class="loading">Carregando animon...</div></div>
<div class="pagination" id="pagination"></div>

<div class="ov" id="ov" onclick="closeOv(event)">
<div class="modal">
  <button class="mcls" onclick="closeModal()">✕</button>
  <div class="mhero">
    <div class="mleft">
      <div class="mnums" id="mnums"></div>
      <div class="mimg" id="mimg"></div>
      <div class="mname" id="mname"></div>
      <div class="mtypes" id="mtypes"></div>
      <div class="mspec" id="mspec"></div>
      <div id="mda"></div>
    </div>
    <div class="mright">
      <div class="sec"><div class="stitle" id="s_desc">Descrição</div><div id="mdesc"></div></div>
      <div class="sec"><div class="stitle" id="s_abil">Habilidades</div><div id="mabil"></div></div>
      <div class="sec"><div class="stitle" id="s_info">Informações</div><div class="igrid" id="minfo"></div></div>
      <div class="sec" id="sec_insp"><div class="stitle" id="s_insp">Inspiração</div><div id="minsp"></div></div>
    </div>
  </div>
</div>
</div>

<script>
let DATA = [];
const PAGE_SIZE = 60;
let currentPage = 1;

const TN_PT={Neutral:"Neutro",Fire:"Fogo",Combat:"Combate",Water:"Água",Flying:"Ar",
  Botanical:"Botânico",Venom:"Tóxico",Electric:"Elétrico",Chthonic:"Terra",
  Mentis:"Psíquico",Mineral:"Mineral",Frost:"Glacial",Arthropod:"Artrópode",
  Dragon:"Dracônico",Spectral:"Espectral",Shadow:"Sombrio",Metal:"Metal",
  Mythic:"Mítico",Cosmic:"Cósmico",Sound:"Som",Tribal:"Tribal",
  Fungal:"Fúngico",Machine:"Máquina",Microbial:"Microbiano"};
const TN_EN={Neutral:"Neutral",Fire:"Fire",Combat:"Combat",Water:"Water",Flying:"Flying",
  Botanical:"Botanical",Venom:"Venom",Electric:"Electric",Chthonic:"Chthonic",
  Mentis:"Mentis",Mineral:"Mineral",Frost:"Frost",Arthropod:"Arthropod",
  Dragon:"Dragon",Spectral:"Spectral",Shadow:"Shadow",Metal:"Metal",Mythic:"Mythic",
  Cosmic:"Cosmic",Sound:"Sound",Tribal:"Tribal",Fungal:"Fungal",Machine:"Machine",Microbial:"Microbial"};

// flag-icons códigos (fi fi-XX) para regiões reais; emoji para ficcionais
const REGION_FLAG = {
  'Brasca':          '<span class="fi fi-br rflag"></span>',
  'Dunnottar':       '<span class="fi fi-gb-sct rflag"></span>',
  'Lekker':          '<span class="fi fi-za rflag"></span>',
  'Rebueno':         '<span class="fi fi-ar rflag"></span>',
  'Unknown':         '<span class="rflag-custom">⬛</span>',
  'Zodiac':          '<span class="rflag-custom">✨</span>',
  'Solar':           '<span class="rflag-custom">🌌</span>',
  'Turtle':          '<span class="rflag-custom">🐢</span>',
  'Paleta':          '<span class="fi fi-mx rflag"></span>'
};

const REGIONS_PT = ["Metanikk Regions","Brasca","Dunnottar","Lekker","Rebueno","Unknown","Zodiac","Solar","Turtle","Paleta Mexicana"];
const REGIONS_EN = ["Metanikk Regions","Brasca","Dunnottar","Lekker","Rebueno","Unknown","Zodiac","Solar","Turtle","Paleta Mexicana"];
const REGION_KEYS = ["all","Brasca","Dunnottar","Lekker","Rebueno","Unknown","Zodiac","Solar","Turtle","Paleta"];


const REGION_FOLDER = {
  'Brasca':'Brasca','Dunnottar':'Dunnottar','Lekker':'Lekker',
  'Rebueno':'Rebueno','Unknown':'Unknown','Zodiac':'Zodiac',
  'Solar':'System Solar','Turtle':'Turtle','Paleta':'Paleta Mexicana'
};

let lang="pt", region="all", typeF="all", query="";

function tn(t){return t?(lang==="pt"?TN_PT[t]||t:TN_EN[t]||t):"";}
function tb(t){return `<span class="tb t-${t}">${tn(t)}</span>`;}

function buildRegionNav(){
  const rlist = lang==="pt"?REGIONS_PT:REGIONS_EN;
  document.getElementById("rnav").innerHTML = REGION_KEYS.map((k,i)=>`
    <button class="rbtn${region===k?" active":""}" onclick="setRegion('${k}')">
      ${k==="all"?'<span class="rflag-custom">🌐</span>':REGION_FLAG[k]||''}
      ${rlist[i]}
    </button>`).join("");
}

function buildTypeFilter(){
  const unique=["all","Botanical","Water","Shadow","Arthropod","Spectral","Fire","Mentis",
    "Neutral","Dragon","Electric","Frost","Venom","Metal","Mythic","Cosmic","Tribal","Sound",
    "Combat","Chthonic","Mineral","Flying"];
  const lbl=lang==="pt"?"Tipo:":"Type:";
  const allLbl=lang==="pt"?"Todos":"All";
  document.getElementById("fbar").innerHTML=`<span class="flbl">${lbl}</span>`+
    unique.map(t=>`<button class="tbtn${typeF===t?" active":""}" onclick="setType('${t}',this)">${t==="all"?allLbl:tn(t)}</button>`).join("");
}

function filtered(){
  return DATA.filter(a=>{
    if(region!=="all" && a.region!==region) return false;
    if(typeF!=="all" && a.type1!==typeF && a.type2!==typeF) return false;
    if(query && !a.name.toLowerCase().includes(query.toLowerCase())) return false;
    return true;
  });
}

function localImg(a){
  const folder = REGION_FOLDER[a.region] || a.region;
  const seq = a.img_seq || a.regional;
  const num = String(seq).padStart(3,'0');
  return 'images/' + folder + '/' + num;
}

function cardImg(a){
  const base = localImg(a);
  return '<img src="'+base+'.png" alt="'+a.name+'" loading="lazy" '+
    'data-jpg="'+base+'.jpg" data-da="'+(a.image_url||'')+'" data-emoji="'+a.emoji+'" '+
    'onerror="imgFallback(this)">';
}

function imgFallback(el){
  const jpg = el.getAttribute('data-jpg');
  const da  = el.getAttribute('data-da');
  const emo = el.getAttribute('data-emoji');
  if(el.src.endsWith('.png') && jpg){ el.src=jpg; return; }
  if(!el.src.includes('deviantart') && da){ el.src=da; return; }
  el.parentElement.innerHTML = emo;
}

function buildPagination(total){
  const pages = Math.ceil(total / PAGE_SIZE);
  if(pages <= 1){ document.getElementById("pagination").innerHTML=""; return; }
  let html = `<button class="pgbtn" onclick="goPage(${currentPage-1})" ${currentPage===1?"disabled":""}>‹</button>`;
  const range = 2;
  for(let p=1;p<=pages;p++){
    if(p===1||p===pages||Math.abs(p-currentPage)<=range){
      html+=`<button class="pgbtn${p===currentPage?" active":""}" onclick="goPage(${p})">${p}</button>`;
    } else if(Math.abs(p-currentPage)===range+1){
      html+=`<span class="pginfo">…</span>`;
    }
  }
  html+=`<button class="pgbtn" onclick="goPage(${currentPage+1})" ${currentPage===pages?"disabled":""}>›</button>`;
  html+=`<span class="pginfo">${currentPage}/${pages}</span>`;
  document.getElementById("pagination").innerHTML=html;
}

function goPage(p){
  const total=filtered().length;
  const pages=Math.ceil(total/PAGE_SIZE);
  if(p<1||p>pages)return;
  currentPage=p;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const list=filtered();
  const total=list.length;
  const pages=Math.ceil(total/PAGE_SIZE);
  if(currentPage>pages) currentPage=1;
  const start=(currentPage-1)*PAGE_SIZE;
  const page=list.slice(start,start+PAGE_SIZE);

  document.getElementById("dcnt").textContent=`${total} animon`;
  document.getElementById("grid").innerHTML=page.map(a=>`
    <div class="card" onclick="openModal(${a.mr})">
      <div class="cnum">#${String(a.mr).padStart(3,"0")} · ${a.region}</div>
      <div class="cimg">${cardImg(a)}</div>
      <div class="cname">${a.name}</div>
      <div class="types">${tb(a.type1)}${a.type2?tb(a.type2):""}</div>
    </div>`).join("");
  buildPagination(total);
}

function openModal(mr){
  const a=DATA.find(x=>x.mr===mr); if(!a)return;
  document.getElementById("mnums").innerHTML=
    `<b>#${String(a.mr).padStart(3,"0")}</b> MetanikRegions<br><b>#${String(a.regional).padStart(3,"0")}</b> ${a.region}`;
  const imgEl=document.getElementById("mimg");
  const base=localImg(a);
  imgEl.innerHTML='<img src="'+base+'.png" alt="'+a.name+'" '+
    'data-jpg="'+base+'.jpg" data-da="'+(a.image_url||'')+'" data-emoji="'+a.emoji+'" '+
    'onerror="imgFallback(this)">';
  document.getElementById("mname").textContent=a.name;
  document.getElementById("mtypes").innerHTML=tb(a.type1)+(a.type2?tb(a.type2):"");
  document.getElementById("mspec").textContent=a.species||(lang==="pt"?"N/D":"N/A");
  const daEl=document.getElementById("mda");
  daEl.innerHTML=a.deviantart_url?`<a class="mda-link" href="${a.deviantart_url}" target="_blank">Ver no DeviantArt ↗</a>`:"";
  document.getElementById("s_desc").textContent=lang==="pt"?"Descrição":"Description";
  document.getElementById("s_abil").textContent=lang==="pt"?"Habilidades":"Abilities";
  document.getElementById("s_info").textContent=lang==="pt"?"Informações":"Information";
  document.getElementById("s_insp").textContent=lang==="pt"?"Inspiração":"Inspiration";
  const descText=lang==="pt"?a.description_pt:a.description_en;
  const nd=lang==="pt"?"N/D — disponível no DeviantArt":"N/A — available on DeviantArt";
  document.getElementById("mdesc").innerHTML=descText?`<p class="lore">${descText}</p>`:`<p class="nd">${nd}</p>`;
  const noHa=lang==="pt"?"Não possui":"Does not have";
  document.getElementById("mabil").innerHTML=`
    <div class="irow"><div><div class="ikey">${lang==="pt"?"Habilidade":"Ability"}</div><div class="ival">${a.ability1||"—"}</div></div><span class="atag">1</span></div>
    ${a.ability2?`<div class="irow"><div><div class="ikey">${lang==="pt"?"Habilidade":"Ability"} 2</div><div class="ival">${a.ability2}</div></div><span class="atag">2</span></div>`:""}
    <div class="irow"><div><div class="ikey">${lang==="pt"?"Hab. Oculta":"Hidden Ability"}</div><div class="ival ${a.ha?"":"nd"}">${a.ha||noHa}</div></div>${a.ha?`<span class="atag hatag">HA</span>`:""}</div>`;
  const nd2=lang==="pt"?"N/D":"N/A";
  document.getElementById("minfo").innerHTML=`
    <div class="iitem"><div class="ikey">${lang==="pt"?"Altura":"Height"}</div><div class="ival">${a.height?a.height+"m":nd2}</div></div>
    <div class="iitem"><div class="ikey">${lang==="pt"?"Peso":"Weight"}</div><div class="ival">${a.weight?a.weight+"kg":nd2}</div></div>
    <div class="iitem"><div class="ikey">Habitat</div><div class="ival">${a.habitat||nd2}</div></div>
    <div class="iitem"><div class="ikey">${lang==="pt"?"Alimentação":"Feeding"}</div><div class="ival">${a.feeding||nd2}</div></div>`;
  if(a.inspiration){
    document.getElementById("minsp").innerHTML=`<div class="insp"><b>${a.inspiration}</b></div>`;
    document.getElementById("sec_insp").style.display="";
  } else {
    document.getElementById("sec_insp").style.display="none";
  }
  document.getElementById("ov").classList.add("open");
}

function closeModal(){document.getElementById("ov").classList.remove("open");}
function closeOv(e){if(e.target===document.getElementById("ov"))closeModal();}
function setRegion(r){region=r;currentPage=1;buildRegionNav();render();}
function setType(t){typeF=t;currentPage=1;buildTypeFilter();render();}
function doSearch(q){query=q;currentPage=1;render();}
function setLang(l,btn){
  lang=l;
  document.querySelectorAll(".lbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  buildRegionNav();buildTypeFilter();render();
}

fetch('data/animons.json')
  .then(r=>r.json())
  .then(data=>{
    DATA=data;
    buildRegionNav();buildTypeFilter();render();
  })
  .catch(err=>{
    document.getElementById("grid").innerHTML=`<div class="loading">Erro ao carregar: ${err.message}</div>`;
  });
</script>
</body>
</html>
